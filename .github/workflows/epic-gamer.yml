name: Epic Awesome Gamer (AI Enhanced)

on:
  workflow_dispatch:
  schedule:
    - cron: '20 15 * * 4'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  epic-gamer:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix:
        account: [1]
    
    if: github.repository != 'Ronchy2000/epic-freebies-helper'

    steps:
      - name: Disable Actions cache
        run: echo "ACTIONS_CACHE_VERSION=2" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libxml2-dev libxslt-dev

      - name: Install dependencies
        run: |
          uv sync
          # 确保 hcaptcha-challenger 及其依赖已安装
          uv pip install --upgrade hcaptcha-challenger

      - name: Install Playwright Firefox
        run: uv run playwright install firefox

      - name: Run Epic Awesome Gamer (AI Mode)
        env:
          EPIC_EMAIL: ${{ secrets[format('EPIC_EMAIL_{0}', matrix.account)] }}
          EPIC_PASSWORD: ${{ secrets[format('EPIC_PASSWORD_{0}', matrix.account)] }}
          SCT_KEY: ${{ secrets[format('SCT_KEY_{0}', matrix.account)] }}
          
          # ================= 核心修改区域 =================
          LLM_PROVIDER: "glm"
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
          GLM_MODEL: "glm-4.1v-thinking-flash"
          # ================================================

          DISABLE_LLM: "false"
          BROWSER_BACKEND: auto
          ENABLE_APSCHEDULER: false
          MPLBACKEND: Agg
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHONPATH: app
        run: |
          set -e
          echo "🚀 正在为账号 ${{ matrix.account }} 执行领取任务..."
          xvfb-run --auto-servernum --server-num=1 --server-args='-screen 0, 1920x1080x24' uv run app/deploy.py

      - name: Success notification
        if: success()
        run: echo "✅ 账号 ${{ matrix.account }} 领取成功！"

      - name: Failure notification
        if: failure()
        run: echo "❌ 账号 ${{ matrix.account }} 领取失败！"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: epic-ai-logs-${{ github.run_id }}-account-${{ matrix.account }}
          path: |
            app/volumes/logs/
            app/volumes/screenshots/
            app/volumes/runtime/
          retention-days: 7
