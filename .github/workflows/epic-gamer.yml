name: Epic Awesome Gamer (AI Enhanced)

on:
  workflow_dispatch: # 手动触发
  schedule:
    # 每周四 UTC 15:20 运行一次（北京时间周四 23:20）
    - cron: '20 15 * * 4'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  epic-gamer:
    runs-on: ubuntu-latest
    timeout-minutes: 60 # 延长超时时间
    strategy:
      matrix:
        account: [1]  # 测试没问题后，改成 [1, 2, 3]
    
    # 默认不在主仓库自身执行定时任务；Fork 后的仓库会正常运行。
    if: github.repository != 'Ronchy2000/epic-freebies-helper'

    steps:
      # 👇 关键修复：禁用缓存，解决 Cache service 400 错误
      - name: Disable Actions cache
        run: echo "ACTIONS_CACHE_VERSION=2" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libxml2-dev libxslt-dev

      - name: Install dependencies
        run: uv sync

      - name: Install Playwright Firefox
        run: uv run playwright install firefox

      - name: Run Epic Awesome Gamer (AI Mode)
        env:
          EPIC_EMAIL: ${{ secrets[format('EPIC_EMAIL_{0}', matrix.account)] }}
          EPIC_PASSWORD: ${{ secrets[format('EPIC_PASSWORD_{0}', matrix.account)] }}
          SCT_KEY: ${{ secrets[format('SCT_KEY_{0}', matrix.account)] }}
          
          # 👇 核心修正：强制使用 Flash 模型，避免 2.5 Pro 额度耗尽
          LLM_PROVIDER: "gemini"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: "gemini-1.5-flash" # 这里是关键！不用 2.5 了
          
          # 👇 关闭不必要的 AI 推理，节省资源
          DISABLE_LLM: "true"
          
          BROWSER_BACKEND: auto
          ENABLE_APSCHEDULER: false
          MPLBACKEND: Agg
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHONPATH: app
        run: |
          set -e
          echo "🚀 正在为账号 ${{ matrix.account }} 执行领取任务..."
          xvfb-run --auto-servernum --server-num=1 --server-args='-screen 0, 1920x1080x24' uv run app/deploy.py

      - name: Success notification
        if: success()
        run: |
          echo "✅ 账号 ${{ matrix.account }} 领取成功！"

      - name: Failure notification
        if: failure()
        run: |
          echo "❌ 账号 ${{ matrix.account }} 领取失败！"

      - name: Upload artifacts
  uses: actions/upload-artifact@v4  <-- 补全为 actions/upload-artifact
  with:
    name: epic-ai-logs-${{ github.run_id }}
    path: |
      app/volumes/logs/
      app/volumes/screenshots/
      app/volumes/runtime/
    retention-days: 7
          retention-days: 7
